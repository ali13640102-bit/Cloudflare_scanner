name: Cloudflare Scan Core

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Telegram Chat ID to send results'
        required: false
        default: '6453638080'

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Scan Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET_USER_ID: ${{ github.event.inputs.user_id }} # تبدیل شناسه کلاینت به متغیر محیطی پایتون
        run: python scanner.py
        
