name: Auto Cloudflare Scanner

on:
  schedule:
    - cron: '37 * * * *'  # هر ساعت روی دقیقه ۳۷ (زمانی که سرورها خلوت‌ترند) اتوماتیک ران می‌شود
  workflow_dispatch:      # بهت اجازه میده هر زمان که خواستی دستی هم اسکنر رو استارت بزنی

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run IP Scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scanner.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add result.txt history.txt v2ray_ips.txt
        git commit -m "Update clean IPs, history and v2ray format" || exit 0
        git push

